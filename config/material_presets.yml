# All dimensional material values use SI units.
# E_x, E_y, E_z: Young's moduli (Pa)
# nu_xy, nu_yz, nu_zx: Poisson ratios (dimensionless)
# G_xy, G_yz, G_zx: shear moduli (Pa)
#
# Print/material axes for the FDM presets:
#   X: raster/filament direction in the printed layer
#   Y: in-layer direction transverse to the raster
#   Z: build direction, normal to the layer plane
#
# A preset only supports failure evaluation when it contains a complete
# ``strength`` mapping. Production strengths are intentionally not guessed:
# they depend strongly on the printer, process settings, and test method.

pla_anisotropic:
  # FDM PLA with layer lines (X) perpendicular to pull (Y)
  # Weakest: Y (perpendicular to layer lines), 2nd: Z (through-layer), Strongest: X (along fibers)
  # Orthotropic mechanical properties of PLA materials fabricated by fused deposition modeling, Li et al.
  # not given values estimated
  E_x: 2.669e9
  E_y: 2.583e9
  E_z: 2.208e9
  G_xy: 0.919e9
  G_yz: 0.8e9 # estimated
  G_zx: 0.844e9
  nu_xy: 0.43
  nu_yz: 0.34 # estimated
  nu_zx: 0.306

pla_isotropic:
  # Averaged values from aniso PLA
  E_x: 2.487e9
  E_y: 2.487e9
  E_z: 2.487e9
  G_xy: 0.915e9
  G_yz: 0.915e9
  G_zx: 0.915e9
  nu_xy: 0.36
  nu_yz: 0.36
  nu_zx: 0.36

pla_xanisotropic:
  #exaggerated anisotropic PLA values for testing
  E_x: 2.669e9
  E_y: 1.0e9
  E_z: 3.0e8
  G_xy: 0.919e9
  G_yz: 0.6e9
  G_zx: 0.75e9
  nu_xy: 0.43
  nu_yz: 0.34
  nu_zx: 0.20

aluminum_5052_h32:
  # TODO get accurate values 
  E_x: 70e9
  E_y: 70e9
  E_z: 70e9
  G_xy: 26e9
  G_yz: 26e9
  G_zx: 26e9
  nu_xy: 0.33
  nu_yz: 0.33
  nu_zx: 0.33

# Synthetic, non-production material used to validate stress/failure code.
# Replace these allowables with measured values before engineering use.
orthotropic_validation:
  E_x: 12.0e9
  E_y: 8.0e9
  E_z: 5.0e9
  G_xy: 3.0e9
  G_yz: 2.0e9
  G_zx: 2.5e9
  nu_xy: 0.22
  nu_yz: 0.18
  nu_zx: 0.16
  strength:
    units: Pa
    X_t: 120.0e6
    X_c: 150.0e6
    Y_t: 80.0e6
    Y_c: 100.0e6
    Z_t: 45.0e6
    Z_c: 70.0e6
    S_xy: 50.0e6
    S_yz: 30.0e6
    S_zx: 35.0e6
    criterion: maximum_stress
